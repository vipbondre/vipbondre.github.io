<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="140" cy="140" r="136"/>
    </clipPath>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="140" cy="140" r="138" fill="url(#bg-grad)" stroke="#334155" stroke-width="2"/>

  <g clip-path="url(#circle-clip)">

    <!-- Ambient glow from screen -->
    <ellipse cx="140" cy="175" rx="70" ry="20" fill="#2563eb" opacity="0.08"/>

    <!-- Desk surface -->
    <rect x="30" y="210" width="220" height="80" fill="#1e293b"/>
    <rect x="30" y="208" width="220" height="4" fill="#334155"/>

    <!-- Laptop body (bottom) -->
    <rect x="75" y="195" width="130" height="14" rx="3" fill="#1e3a5f"/>
    <rect x="75" y="195" width="130" height="3" rx="2" fill="#2563eb" opacity="0.4"/>

    <!-- Laptop screen -->
    <rect x="80" y="105" width="120" height="92" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <!-- Screen inner bezel -->
    <rect x="85" y="110" width="110" height="82" rx="3" fill="url(#screen-grad)"/>

    <!-- Terminal content on screen -->
    <!-- Prompt line 1 -->
    <text x="92" y="126" font-family="monospace" font-size="7" fill="#4ade80">$ whoami</text>
    <text x="92" y="136" font-family="monospace" font-size="7" fill="#94a3b8">vipul_bondre</text>
    <!-- Prompt line 2 -->
    <text x="92" y="148" font-family="monospace" font-size="7" fill="#4ade80">$ ls skills/</text>
    <text x="92" y="158" font-family="monospace" font-size="7" fill="#7dd3fc">python  react  docker</text>
    <!-- Prompt line 3 -->
    <text x="92" y="170" font-family="monospace" font-size="7" fill="#4ade80">$ git push</text>
    <text x="92" y="180" font-family="monospace" font-size="7" fill="#94a3b8">→ origin/main ✓</text>

    <!-- Blinking cursor -->
    <rect x="92" y="185" width="5" height="7" fill="#4ade80" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Person / body -->
    <!-- Torso / hoodie -->
    <ellipse cx="140" cy="86" rx="28" ry="12" fill="#1e293b"/>
    <!-- Shoulders -->
    <path d="M 112 90 Q 110 105 108 115 L 172 115 Q 170 105 168 90 Q 155 98 140 98 Q 125 98 112 90 Z" fill="#1e3a5f"/>
    <!-- Hood collar detail -->
    <path d="M 125 90 Q 140 96 155 90" stroke="#2563eb" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Neck -->
    <rect x="136" y="72" width="8" height="14" rx="3" fill="#d4a574"/>

    <!-- Head -->
    <ellipse cx="140" cy="62" rx="18" ry="20" fill="#c9956a"/>

    <!-- Hair (short, dark) -->
    <path d="M 123 58 Q 123 38 140 36 Q 157 38 157 58 Q 153 50 140 48 Q 127 50 123 58 Z" fill="#1a1a2e"/>
    <!-- Hair side -->
    <path d="M 123 58 Q 120 63 122 68" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 157 58 Q 160 63 158 68" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Glasses -->
    <rect x="128" y="60" width="10" height="7" rx="2" fill="none" stroke="#334155" stroke-width="1.5"/>
    <rect x="142" y="60" width="10" height="7" rx="2" fill="none" stroke="#334155" stroke-width="1.5"/>
    <line x1="138" y1="63" x2="142" y2="63" stroke="#334155" stroke-width="1.5"/>
    <!-- Glasses tint -->
    <rect x="128" y="60" width="10" height="7" rx="2" fill="#2563eb" opacity="0.15"/>
    <rect x="142" y="60" width="10" height="7" rx="2" fill="#2563eb" opacity="0.15"/>
    <!-- Nose -->
    <path d="M 139 66 Q 137 70 140 71 Q 143 70 141 66" fill="#b5845a"/>
    <!-- Subtle smile -->
    <path d="M 135 74 Q 140 78 145 74" stroke="#b5845a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Arms -->
    <!-- Left arm resting on laptop -->
    <path d="M 112 100 Q 100 115 95 135 Q 90 148 80 198" stroke="#1e3a5f" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Left hand -->
    <ellipse cx="80" cy="200" rx="7" ry="5" fill="#c9956a"/>

    <!-- Right arm -->
    <path d="M 168 100 Q 180 115 185 135 Q 190 148 200 198" stroke="#1e3a5f" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Right hand -->
    <ellipse cx="200" cy="200" rx="7" ry="5" fill="#c9956a"/>

    <!-- Coffee mug on desk -->
    <rect x="215" y="192" width="16" height="16" rx="2" fill="#1e3a5f" stroke="#334155" stroke-width="1"/>
    <path d="M 231 197 Q 237 197 237 200 Q 237 203 231 203" stroke="#334155" stroke-width="1.5" fill="none"/>
    <!-- Steam -->
    <path d="M 220 190 Q 219 186 221 183" stroke="#64748b" stroke-width="1" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 224 190 Q 223 185 225 181" stroke="#64748b" stroke-width="1" fill="none" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- Floating code bits (decorative) -->
    <text x="32" y="75" font-family="monospace" font-size="8" fill="#2563eb" opacity="0.5" transform="rotate(-15, 32, 75)">&lt;/&gt;</text>
    <text x="228" y="80" font-family="monospace" font-size="8" fill="#4ade80" opacity="0.5" transform="rotate(12, 228, 80)">{}</text>
    <text x="40" y="160" font-family="monospace" font-size="7" fill="#7dd3fc" opacity="0.4">0x1F</text>
    <text x="235" y="155" font-family="monospace" font-size="7" fill="#a78bfa" opacity="0.4">#!/</text>

  </g>

  <!-- Outer ring -->
  <circle cx="140" cy="140" r="136" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <circle cx="140" cy="140" r="138" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
</svg>
